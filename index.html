<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وظائف السعودية 2026 | رواتب تصل 8000 ريال</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);margin:0;color:#333;}
.container{max-width:420px;margin:auto;padding:20px;}
.title{text-align:center;color:#fff;font-size:25px;font-weight:700;}
.badge{background:#00c851;color:#fff;padding:10px;border-radius:20px;text-align:center;margin:10px 0;font-weight:700;}
.urgent{background:#ff4444;color:#fff;padding:10px;border-radius:15px;text-align:center;font-size:14px;}
.card{background:#fff;padding:25px;border-radius:20px;margin-top:15px;box-shadow:0 15px 40px rgba(0,0,0,.2);}
.step{display:none;}
.step.active{display:block;}
select,input{width:100%;padding:15px;margin-top:10px;border-radius:12px;border:1px solid #ddd;font-size:16px;}
button{width:100%;padding:18px;margin-top:15px;border:none;border-radius:20px;background:#ff5a5f;color:#fff;font-size:18px;font-weight:700;cursor:pointer;}
.progress{height:6px;background:#eee;border-radius:10px;margin-bottom:15px;overflow:hidden;}
.bar{height:100%;width:25%;background:#00c851;transition:.3s;}
.fake{font-size:13px;color:#28a745;margin-bottom:10px;}
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;justify-content:center;align-items:center;z-index:999;}
.popup-content{background:#fff;padding:25px;border-radius:20px;text-align:center;width:85%;}
.hidden{display:none;}
</style>
</head>
<body>
<div class="container">
<h1 class="title">وظائف السعودية 🇸🇦</h1>
<div class="badge">✔ تم قبول 327 طلب هذا الأسبوع</div>
<div class="urgent">🔥 متبقي 3 أماكن فقط اليوم</div>
<div class="card">
<div class="progress"><div class="bar" id="bar"></div></div>
<div class="fake" id="notif">شخص من الرياض بدأ التقديم الآن</div>
<form id="form">
<!-- STEP 1 -->
<div class="step active">
<label>اختر الوظيفة المناسبة لك</label>
<select id="job" required>
<option value="">اختر الوظيفة</option>
<option>سائق</option>
<option>سائق خاص</option>
<option>عامل</option>
<option>موظف استقبال</option>
<option>حارس أمن</option>
<option>محاسب</option>
<option>سكرتير/ة</option>
<option>مدرس/ة</option>
<option>مسوق إلكتروني</option>
<option>مندوب توصيل</option>
<option>فني كهرباء</option>
<option>نجار</option>
<option>سباك</option>
<option>طباخ</option>
<option>كاشير</option>
<option>ممرض/ة</option>
<option value="other">وظيفة أخرى</option>
</select>
<input type="text" id="otherJob" class="hidden" placeholder="اكتب وظيفتك هنا">
<button type="button" onclick="nextStep()">التالي</button>
</div>

<!-- STEP 2 -->
<div class="step">
<label>السن</label>
<select id="age" required>
<option value="">اختر السن</option>
<option>18-22</option>
<option>23-30</option>
<option>31-40</option>
<option>41+</option>
</select>
<button type="button" onclick="nextStep()">التالي</button>
</div>

<!-- STEP 3 -->
<div class="step">
<label>اسمك الكامل</label>
<input type="text" id="name" required>
<button type="button" onclick="nextStep()">تأكيد البيانات</button>
</div>

<!-- STEP 4 -->
<div class="step">
<h3 style="text-align:center;">🎉 تم قبولك مبدئياً</h3>
<p style="text-align:center;">بناءً على بياناتك، أنت مؤهل للوظيفة</p>
<!-- الزر الآن يفتح مباشرة رابط العرض -->
<button type="button" id="finalBtn">إكمال التقديم الآن 🔥</button>
</div>

</form>
</div>
</div>

<div class="popup" id="popup">
<div class="popup-content">
<h3>⏳ جاري تحويلك...</h3>
<p>يرجى الانتظار</p>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){
let step=0;
const steps=document.querySelectorAll(".step");
const bar=document.getElementById("bar");
const job=document.getElementById("job");
const otherJob=document.getElementById("otherJob");
const age=document.getElementById("age");
const name=document.getElementById("name");
const notif=document.getElementById("notif");
const finalBtn=document.getElementById("finalBtn");
const popup=document.getElementById("popup");

// اظهار "وظيفة أخرى"
job.addEventListener("change", function(){
if(job.value==="other"){ otherJob.classList.remove("hidden"); }
else{ otherJob.classList.add("hidden"); }
});

// التنقل بين الخطوات
window.nextStep=function(){
if(step===0){ if(!job.value) return; if(job.value==="other" && !otherJob.value) return; }
if(step===1 && !age.value) return;
if(step===2 && !name.value) return;
steps[step].classList.remove("active");
step++;
if(steps[step]){
steps[step].classList.add("active");
bar.style.width=(step+1)*25+"%";
}
}

// fake notifications
const fakeList=["أحمد من جدة سجل الآن","سارة من الرياض تم قبولها","تم حجز مقابلة قبل دقيقة","مستخدم جديد أكمل التسجيل"];
setInterval(()=>{ notif.innerText=fakeList[Math.floor(Math.random()*fakeList.length)]; },2500);

// تحويل عند الضغط على زر النهائي
finalBtn.addEventListener("click", function(){
popup.style.display="flex";
setTimeout(function(){
window.location.href="https://xmaaubb.bid/cl/ab0187b5f3ec8583"; // لينك العرض
},1500);
});

});
</script>

</body>
</html>
