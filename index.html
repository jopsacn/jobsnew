<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>فرص عمل للسعوديين</title>

<style>

body{
font-family:tahoma;
background:#f3f4f6;
margin:0;
padding:0;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
padding:25px;
margin-top:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

h1{
color:#047857;
}

.question{
font-size:20px;
margin:20px 0;
}

.btn{
display:block;
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:18px;
background:#047857;
color:#fff;
cursor:pointer;
}

.btn:hover{
background:#065f46;
}

.hidden{
display:none;
}

.cta{
display:block;
background:#dc2626;
color:#fff;
padding:18px;
border-radius:12px;
font-size:20px;
text-decoration:none;
margin-top:20px;
}

.counter{
background:#fef3c7;
padding:10px;
border-radius:10px;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>📢 فرص عمل للسعوديين</h1>

<div class="counter">
📈 أكثر من 1200 شخص قدم اليوم
</div>

<div id="step1">

<div class="question">
هل أنت مقيم في السعودية؟
</div>

<button class="btn" onclick="next(2)">نعم</button>
<button class="btn" onclick="next(2)">لا</button>

</div>


<div id="step2" class="hidden">

<div class="question">
هل عمرك بين 21 و 55 سنة؟
</div>

<button class="btn" onclick="next(3)">نعم</button>
<button class="btn" onclick="next(3)">لا</button>

</div>


<div id="step3" class="hidden">

<div class="question">
هل تستخدم رقم جوال سعودي؟
</div>

<button class="btn" onclick="next(4)">نعم</button>
<button class="btn" onclick="next(4)">لا</button>

</div>


<div id="step4" class="hidden">

<h2 style="color:#047857">
✅ أنت مؤهل للتسجيل
</h2>

<p>
اضغط الزر بالأسفل وأدخل رقم الجوال لاستلام كود التفعيل
</p>

<a href="https://duwfobb.one/cl/5c37f594ae1924f7?p1={campaign.name}&p2={ad.name}&source=facebook&site=fb" class="cta">

📲 ابدأ التسجيل الآن

</a>

</div>

</div>


<script>

function next(step){

document.querySelectorAll("[id^=step]").forEach(el=>el.classList.add("hidden"));

document.getElementById("step"+step).classList.remove("hidden");

}

</script>

</body>

</html>
